<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Combine Events</title>
  </head>
  <body>
    <button>hello</button>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Illo excepturi
      sint alias, velit non architecto quae doloribus maiores, modi nesciunt
      eaque repellendus natus dicta soluta recusandae tenetur vel eligendi?
      Veniam?
    </p>
    <script>
      let btn = document.querySelector("button");
      btn.onclick = () => {
        console.log("button clicked");
      };
      let para = document.querySelector("p");
      para.addEventListener("click", (evt) => {
        console.log("button click");
        console.log(evt)
      });
      para.addEventListener("click", () => {
        console.log("Hello")
      })


    </script>
  </body>
</html>
